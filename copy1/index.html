
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KidsScreen - Fun Growth Games!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8B5CF6;
            --secondary: #FF9F1C;
            --bg: #FFF9E6;
        }
        
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: var(--bg);
            margin: 0;
            overflow-x: hidden;
        }
        
        /* Smooth Global Transitions */
        * {
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* 3D Perspective Container */
        .perspective-container {
            perspective: 1000px;
        }

        /* 3D Lift & Tilt Card */
        .tilt-card {
            transform-style: preserve-3d;
        }
        .tilt-card:hover {
            transform: translateY(-12px) rotateX(4deg) rotateY(-2deg);
            box-shadow: 0 30px 60px -12px rgba(139, 92, 246, 0.25);
        }

        /* 360 Rotation on Parent Hover */
        .group:hover .rotate-360 {
            transform: rotate(360deg) scale(1.1);
        }

        /* Staggered Pop In Animation */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .animate-pop-in {
            animation: popIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            opacity: 0;
        }

        .kids-shadow {
            box-shadow: 0 16px 0px rgba(0, 0, 0, 0.05);
        }
        
        .kids-button-shadow {
            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.1);
        }
        
        .kids-button-shadow:active {
            box-shadow: 0 2px 0px rgba(0, 0, 0, 0.1);
            transform: translateY(6px) scale(0.98);
        }

        /* Floating Animation */
        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        .animate-float {
            animation: floating 3s ease-in-out infinite;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 12px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #E9D5FF; border-radius: 10px; border: 4px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: #D8B4FE; }
    </style>
